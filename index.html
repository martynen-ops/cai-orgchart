<head>

  <style>
    :root {
      --bg: #F5F7FA;
      --surface: #FFFFFF;
      --surface-2: #F4F7FB;
      --text-1: #0A1F3D;
      --text-2: #394A63;
      --text-3: #6B7A90;
      --border: #DCE3EC;
      --link-color: #A6B2C4;
      --hover-bg: #EAF0F8;
      --hover-border: #B9CCE3;
      --toolbar-bg: rgba(245,247,250,0.88);
      --legend-bg: rgba(255,255,255,0.94);
      --search-hit: #FFF7D6;

      --um-blue: #00274C;
      --um-maize: #FFCB05;
      --um-maize-ink: #B68D00;

      --c-executive: #00274C;
      --c-learning: #2F65A7;
      --c-technology: #75988D;
      --c-operations: #D86018;
      --c-marketing: #B68D00;
      --c-solutions: #6B4C7A;

      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      --ease: cubic-bezier(.4,0,.2,1);
    }

    [data-theme="dark"] {
      --bg: #071A30;
      --surface: #0F2A4A;
      --surface-2: #0B2340;
      --text-1: #EEF3FA;
      --text-2: #C4D2E4;
      --text-3: #8AA1BF;
      --border: #1E3A5F;
      --link-color: #3C597E;
      --hover-bg: #133457;
      --hover-border: #2B527E;
      --toolbar-bg: rgba(7,26,48,0.88);
      --legend-bg: rgba(15,42,74,0.94);
      --search-hit: #3A2F00;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    .sr-only {
      position: absolute; width: 1px; height: 1px;
      padding: 0; margin: -1px; overflow: hidden;
      clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: var(--font);
      color: var(--text-1);
      -webkit-text-size-adjust: 100%;
    }

    #toolbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      background: var(--toolbar-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }

    .toolbar-stat {
      font-size: 11px;
      color: var(--text-3);
      white-space: nowrap;
      padding: 4px 8px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-variant-numeric: tabular-nums;
    }
    .toolbar-stat strong {
      color: var(--text-1);
      font-weight: 600;
    }

    #toolbar h1 {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text-1);
      white-space: nowrap;
    }

    #toolbar .subtitle {
      font-size: 12px;
      color: var(--text-3);
      white-space: nowrap;
    }

    .toolbar-spacer { flex: 1; }

    #search-box {
      width: 260px;
      padding: 8px 12px 8px 36px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 16px;
      font-family: var(--font);
      background: var(--surface);
      color: var(--text-1);
      outline: none;
      transition: border-color 200ms var(--ease), box-shadow 200ms var(--ease);
    }
    #search-box:focus {
      border-color: var(--um-blue);
      box-shadow: 0 0 0 3px rgba(255,203,5,0.35);
    }
    #search-box::placeholder { color: var(--text-3); }

    .search-wrap {
      position: relative;
    }
    .search-wrap svg {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: var(--text-3);
    }

    .search-results {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      width: 320px;
      max-width: calc(100vw - 40px);
      max-height: 340px;
      overflow-y: auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 8px 32px rgba(13,24,35,0.12);
      z-index: 200;
    }
    .search-results.visible { display: block; }
    .search-result-item {
      padding: 10px 14px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 120ms var(--ease);
    }
    .search-result-item:last-child { border-bottom: none; }
    .search-result-item:hover, .search-result-item.active {
      background: var(--search-hit);
    }
    .search-result-item .sr-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-1);
    }
    .search-result-item .sr-title {
      font-size: 12px;
      color: var(--text-2);
      margin-top: 2px;
    }
    .search-result-item mark {
      background: rgba(255,203,5,0.45);
      color: inherit;
      border-radius: 2px;
      padding: 0 1px;
    }

    .btn-group {
      display: flex;
      gap: 4px;
    }

    .btn-icon {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      cursor: pointer;
      color: var(--text-2);
      transition: all 150ms var(--ease);
    }
    .btn-icon:hover { background: var(--hover-bg); color: var(--c-executive); border-color: var(--hover-border); }
    .btn-icon.active {
      background: var(--hover-bg);
      color: var(--c-executive);
      border-color: var(--hover-border);
    }
    .btn-icon:active { transform: scale(0.95); }
    .btn-icon:focus-visible, .btn-text:focus-visible {
      outline: 2px solid var(--um-maize);
      outline-offset: 2px;
    }

    .btn-text {
      height: 44px;
      padding: 0 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      cursor: pointer;
      color: var(--text-2);
      font-size: 13px;
      font-family: var(--font);
      font-weight: 500;
      white-space: nowrap;
      transition: all 150ms var(--ease);
    }
    .btn-text:hover { background: var(--hover-bg); color: var(--c-executive); border-color: var(--hover-border); }
    .btn-text:active { transform: scale(0.97); }

    #chart-container {
      width: 100%;
      height: 100%;
      padding-top: 60px;
    }

    #chart-container svg {
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    .node-group { cursor: pointer; }

    .node-card {
      fill: var(--surface);
      stroke: var(--border);
      stroke-width: 1;
      rx: 10;
      ry: 10;
      filter: url(#cardShadow);
      transition: filter 200ms var(--ease);
    }

    .node-group:hover .node-card {
      filter: url(#cardShadowHover);
    }

    .node-group.highlighted .node-card {
      stroke-width: 2.5;
      filter: url(#cardShadowHover);
    }

    .node-accent {
      rx: 10; ry: 10;
    }

    .node-name {
      font-size: 13px;
      font-weight: 600;
      fill: var(--text-1);
      font-family: var(--font);
    }

    .node-title {
      font-size: 11px;
      fill: var(--text-2);
      font-family: var(--font);
    }

    .node-count {
      font-size: 10px;
      font-weight: 600;
      fill: var(--text-3);
      font-family: var(--font);
    }

    .node-expand {
      fill: var(--bg);
      stroke: var(--border);
      stroke-width: 1;
      cursor: pointer;
    }
    .node-expand-hit {
      fill: transparent;
      cursor: pointer;
    }
    .node-expand-icon {
      fill: var(--text-3);
      font-size: 14px;
      font-family: var(--font);
      font-weight: 400;
      text-anchor: middle;
      dominant-baseline: central;
      pointer-events: none;
    }

    .link {
      fill: none;
      stroke: var(--link-color);
      stroke-width: 1.5;
      stroke-opacity: 0.5;
    }

    .node-avatar-img {
      pointer-events: none;
    }
    .node-avatar-initials {
      font-size: 14px;
      font-weight: 600;
      font-family: var(--font);
      text-anchor: middle;
      dominant-baseline: central;
      pointer-events: none;
    }
    .node-avatar-ring {
      pointer-events: none;
    }

    .vacancy .node-card {
      stroke-dasharray: 5, 4;
      stroke: var(--text-3);
      stroke-opacity: 0.6;
      fill: var(--surface-2);
    }
    .vacancy .node-accent {
      opacity: 0.35;
    }
    .vacancy .node-name {
      fill: var(--text-3);
      font-style: italic;
    }
    .vacancy .node-title {
      fill: var(--text-3);
      font-style: italic;
    }

    .node-group.dept-dimmed {
      opacity: 0.12;
      pointer-events: none;
    }
    .node-group.dept-dimmed .node-card {
      filter: none;
    }
    .link.dept-dimmed {
      opacity: 0.08;
    }

    .minimap-container {
      position: fixed;
      bottom: 16px;
      right: 16px;
      width: 200px;
      height: 140px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      overflow: hidden;
      z-index: 90;
    }
    .minimap-container svg {
      width: 100%; height: 100%;
    }
    .minimap-viewport {
      fill: rgba(255,203,5,0.12);
      stroke: var(--um-blue);
      stroke-width: 1.5;
    }
    .minimap-node { transition: fill 200ms var(--ease); }

    .focus-bar {
      position: fixed;
      top: 72px;
      left: 50%;
      transform: translateX(-50%) translateY(-8px);
      z-index: 95;
      display: none;
      align-items: center;
      gap: 10px;
      padding: 8px 8px 8px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      font-family: var(--font);
      opacity: 0;
      transition: opacity 200ms var(--ease), transform 200ms var(--ease);
    }
    .focus-bar.visible {
      display: flex;
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .focus-bar-label {
      font-size: 12px;
      color: var(--text-2);
      white-space: nowrap;
    }
    .focus-bar-label strong {
      color: var(--text-1);
      font-weight: 600;
    }
    .focus-bar .btn-text {
      height: 32px;
      padding: 0 10px;
      font-size: 12px;
    }
    .focus-bar .btn-icon {
      width: 32px;
      height: 32px;
    }
    @media (max-width: 640px) {
      .focus-bar {
        top: auto;
        bottom: 76px;
        left: 8px;
        right: 8px;
        transform: none;
        flex-wrap: wrap;
      }
      .focus-bar.visible { transform: none; }
      .focus-bar-label { flex: 1 1 100%; }
    }

    .node-group.subtree-member .node-card {
      stroke-width: 1.5;
    }
    .node-group.subtree-dim {
      opacity: 0.12;
      pointer-events: none;
    }
    .link.subtree-dim {
      opacity: 0.08;
    }

    .credit {
      position: fixed;
      bottom: 164px;
      right: 16px;
      font-size: 11px;
      color: var(--text-3);
      opacity: 0.5;
      z-index: 90;
      font-family: var(--font);
      letter-spacing: 0.01em;
      transition: opacity 0.2s var(--ease);
    }
    .credit:hover { opacity: 1; }

    .legend {
      position: fixed;
      bottom: 16px;
      left: 16px;
      display: flex;
      flex-wrap: nowrap;
      gap: 4px;
      padding: 6px;
      background: var(--legend-bg);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      z-index: 90;
      align-items: center;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-2);
      white-space: nowrap;
      padding: 6px 10px;
      border-radius: 6px;
      background: transparent;
      border: 1px solid transparent;
      cursor: pointer;
      font-family: var(--font);
      transition: all 150ms var(--ease);
      user-select: none;
    }
    .legend-item:hover {
      background: var(--hover-bg);
      border-color: var(--hover-border);
    }
    .legend-item:focus-visible {
      outline: 2px solid var(--um-maize);
      outline-offset: 2px;
    }
    .legend-item.inactive {
      opacity: 0.45;
    }
    .legend-item.inactive .legend-dot {
      filter: grayscale(0.6);
    }
    .legend-sep {
      width: 1px;
      align-self: stretch;
      background: var(--border);
      margin: 4px 2px;
    }
    .legend-reset {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-3);
      padding: 6px 10px;
      border-radius: 6px;
      background: transparent;
      border: 1px solid transparent;
      cursor: pointer;
      font-family: var(--font);
      transition: all 150ms var(--ease);
    }
    .legend-reset:hover {
      background: var(--hover-bg);
      color: var(--c-executive);
      border-color: var(--hover-border);
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 3px;
      transition: filter 150ms var(--ease);
    }

    .tooltip {
      display: none;
      position: fixed;
      z-index: 300;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      padding: 14px 18px;
      max-width: 300px;
      pointer-events: none;
      text-align: center;
      color: var(--text-1);
    }
    .tooltip.visible { display: block; }
    .tooltip-photo {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      overflow: hidden;
      margin: 0 auto 10px;
    }
    .tooltip-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .tooltip-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-1);
      margin-bottom: 4px;
    }
    .tooltip-title {
      font-size: 13px;
      color: var(--text-2);
      margin-bottom: 8px;
      line-height: 1.4;
    }
    .tooltip-dept {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 4px;
      color: white;
    }
    .tooltip-reports {
      font-size: 12px;
      color: var(--text-3);
      margin-top: 6px;
    }

    @media (max-width: 900px) {
      #toolbar { padding: 10px 12px; gap: 8px; }
      #toolbar h1 { font-size: 13px; }
      #toolbar .subtitle { display: none; }
      .toolbar-stat { display: none; }
      #search-box { width: 180px; font-size: 16px; }
      .legend { bottom: 8px; left: 8px; padding: 4px; }
      .minimap-container { width: 150px; height: 100px; }
    }

    @media (max-width: 640px) {
      #toolbar { flex-wrap: wrap; padding: 8px 12px; gap: 6px; }
      #toolbar h1 { font-size: 13px; order: 0; }
      .toolbar-spacer { display: none; }
      .search-wrap { order: 10; flex: 1 1 100%; }
      #search-box { width: 100%; font-size: 16px; }
      .search-results { width: 100%; }
      .btn-group { order: 2; }
      .btn-text span { display: none; }
      .btn-text { padding: 0 10px; min-width: 44px; justify-content: center; }
      .minimap-container { display: none; }
      .credit { display: none; }
      .legend { max-width: calc(100vw - 16px); flex-wrap: wrap; }
      #chart-container { padding-top: 100px; }
    }

    @media print {
      html, body { overflow: visible !important; height: auto !important; background: #fff !important; }
      #toolbar, .minimap-container, .tooltip, .search-results, .credit { display: none !important; }
      #chart-container { padding-top: 0 !important; height: auto !important; }
      .legend {
        position: static;
        display: flex;
        margin: 0 0 12px 0;
        box-shadow: none;
        background: #fff;
        page-break-inside: avoid;
      }
      .legend-item { cursor: default; }
      #chart-container svg {
        width: 100% !important;
        height: auto !important;
        display: block;
        overflow: visible;
      }
      .node-card { filter: none !important; }
      @page { size: landscape; margin: 1cm; }
    }
  </style>
</head>
<body>

<div id="toolbar">
  <h1>Center for Academic Innovation</h1>
  <span class="subtitle">Full Team Org Chart</span>
  <div class="toolbar-spacer"></div>
  <div class="search-wrap" role="search">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <label for="search-box" class="sr-only">Search people</label>
    <input type="text" id="search-box" placeholder="Search people…" autocomplete="off" role="combobox" aria-expanded="false" aria-controls="search-results" aria-autocomplete="list" aria-keyshortcuts="/" />
    <div class="search-results" id="search-results" role="listbox"></div>
  </div>
  <div class="btn-group">
    <button class="btn-icon" id="btn-zoom-in" title="Zoom in" aria-label="Zoom in">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
    <button class="btn-icon" id="btn-zoom-out" title="Zoom out" aria-label="Zoom out">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
    <button class="btn-icon" id="btn-fit" title="Fit to screen" aria-label="Fit to screen">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/></svg>
    </button>
  </div>
  <button class="btn-text" id="btn-expand-all" aria-label="Expand all nodes">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
    <span>Expand all</span>
  </button>
  <button class="btn-text" id="btn-collapse" aria-label="Collapse to top level">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="14" y1="10" x2="21" y2="3"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
    <span>Collapse</span>
  </button>
  <button class="btn-text" id="btn-print" aria-label="Print or save as PDF" title="Print or save as PDF">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
    <span>Print</span>
  </button>
  <button class="btn-text" id="btn-export" aria-label="Export as image" title="Download current view as PNG">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    <span>PNG</span>
  </button>

function getInitials(name) {
  if (name === "VACANCY") return "?";
  const parts = name.split(/\s+/);
  if (parts.length === 1) return parts[0][0];
  return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
}

const NODE_H = 64;

const root = d3.hierarchy(ORG_DATA);
let idCounter = 0;
root.each(d => { d.data._id = idCounter++; });

root.each(d => {
  if (d.children && d.depth >= 1) {
    d._children = d.children;
    d.children = null;
  }
});

const ALL_DEPTS = ["executive", "learning", "technology", "operations", "marketing", "solutions"];
const activeDepts = new Set(ALL_DEPTS);

const tooltip = document.getElementById("tooltip");
const searchBox = document.getElementById("search-box");
const searchResults = document.getElementById("search-results");

function countDescendants(d) {
  if (!d._children && !d.children) return 0;
  let kids = d._children || d.children || [];
  let count = kids.length;
  kids.forEach(c => { count += countDescendants(c); });
  return count;
}

function truncate(text, maxLen) {
  return text.length > maxLen ? text.slice(0, maxLen - 1) + "…" : text;
}

function update(source) {
  const tree = d3.tree()
    .nodeSize([NODE_W + 24, NODE_H + 60])
    .separation((a, b) => a.parent === b.parent ? 1 : 1.15);

  tree(root);

  const nodes = root.descendants();
  const links = root.links();

  const linkGen = d3.linkVertical()
    .x(d => d.x)
    .y(d => d.y);

  const linkSel = gLinks.selectAll(".link").data(links, d => d.target.data._id);

  linkSel.exit()
    .transition().duration(300)
    .attr("d", () => {
      const o = { x: source.x, y: source.y };
      return linkGen({ source: o, target: o });
    })
    .remove();

  const linkEnter = linkSel.enter()
    .append("path")
    .attr("class", "link")
    .attr("d", () => {
      const o = { x: source.x, y: source.y };
      return linkGen({ source: o, target: o });
    });

  linkEnter.merge(linkSel)
    .transition().duration(400).ease(d3.easeCubicOut)
    .attr("d", linkGen);

  const nodeSel = gNodes.selectAll(".node-group").data(nodes, d => d.data._id);

  nodeSel.exit()
    .transition().duration(300)
    .attr("transform", `translate(${source.x},${source.y})`)
    .style("opacity", 0)
    .remove();

  const nodeEnter = nodeSel.enter()
    .append("g")
    .attr("class", d => `node-group ${d.data.name === "VACANCY" ? "vacancy" : ""}`)
    .attr("transform", `translate(${source.x},${source.y})`)
    .style("opacity", 0)
    .on("click", (e, d) => {
      e.stopPropagation();
      focusNode(d);
    })
    .on("mouseenter", (e, d) => showTooltip(e, d))
    .on("mousemove", (e) => moveTooltip(e))
    .on("mouseleave", hideTooltip)
    .on("touchstart", (e, d) => {
      showTooltip(e.touches[0], d);
      setTimeout(hideTooltip, 2500);
    }, { passive: true });

  const halfW = NODE_W / 2;
  const halfH = NODE_H / 2;
  const avatarR = 20;
  const avatarCX = -halfW + 32;
  const avatarCY = 0;
  const textX = -halfW + 60;

  nodeEnter.append("rect")
    .attr("class", "node-card")
    .attr("x", -halfW).attr("y", -halfH)
    .attr("width", NODE_W).attr("height", NODE_H);

  nodeEnter.append("rect")
    .attr("class", "node-accent")
    .attr("x", -halfW).attr("y", -halfH)
    .attr("width", 4).attr("height", NODE_H)
    .attr("fill", d => DEPT_COLORS[d.data.dept]);

  nodeEnter.append("clipPath")
    .attr("id", d => `clip-avatar-${d.data._id}`)
    .append("circle")
    .attr("cx", avatarCX).attr("cy", avatarCY).attr("r", avatarR);

  function addAvatarFallback(g, d) {
    g.append("circle")
      .attr("class", "node-avatar-fallback")
      .attr("cx", avatarCX).attr("cy", avatarCY).attr("r", avatarR)
      .attr("fill", d.data.name === "VACANCY" ? "#E2E8F0" : DEPT_COLORS[d.data.dept] + "22")
      .attr("stroke", d.data.name === "VACANCY" ? "#CBD5E1" : DEPT_COLORS[d.data.dept] + "44")
      .attr("stroke-width", 1);
    g.append("text")
      .attr("class", "node-avatar-initials")
      .attr("x", avatarCX).attr("y", avatarCY)
      .attr("fill", d.data.name === "VACANCY" ? "#64748B" : DEPT_COLORS[d.data.dept])
      .text(getInitials(d.data.name));
  }

  nodeEnter.each(function(d) {
    const g = d3.select(this);
    const imgUrl = STAFF_IMAGES[d.data.name];
    if (imgUrl) {
      g.append("image")
        .attr("class", "node-avatar-img")
        .attr("href", displayImageUrl(imgUrl, 96))
        .attr("x", avatarCX - avatarR).attr("y", avatarCY - avatarR)
        .attr("width", avatarR * 2).attr("height", avatarR * 2)
        .attr("preserveAspectRatio", "xMidYMid slice")
        .attr("clip-path", `url(#clip-avatar-${d.data._id})`)
        .on("error", function() {
          d3.select(this).remove();
          g.select(".node-avatar-ring").remove();
          addAvatarFallback(g, d);
        });
    } else {
      addAvatarFallback(g, d);
    }
  });

  nodeEnter.append("circle")
    .attr("class", "node-avatar-ring")
    .attr("cx", avatarCX).attr("cy", avatarCY).attr("r", avatarR)
    .attr("fill", "none")
    .attr("stroke", d => STAFF_IMAGES[d.data.name] ? "#fff" : "none")
    .attr("stroke-width", 2);

  nodeEnter.append("text")
    .attr("class", "node-name")
    .attr("x", textX).attr("y", -halfH + 24)
    .text(d => truncate(d.data.name, 22));

  nodeEnter.append("text")
    .attr("class", "node-title")
    .attr("x", textX).attr("y", -halfH + 42)
    .text(d => truncate(d.data.title, 28));

  nodeEnter.each(function(d) {
    const hasKids = d._children || d.children;
    if (!hasKids) return;
    const g = d3.select(this);
    const collapsed = !!d._children;
    const count = countDescendants(d);

    g.append("circle")
      .attr("class", "node-expand")
      .attr("cx", 0).attr("cy", halfH + 14)
      .attr("r", 11);

    g.append("circle")
      .attr("class", "node-expand-hit")
      .attr("cx", 0).attr("cy", halfH + 14)
      .attr("r", 22)
      .on("click", (e, dd) => {
        e.stopPropagation();
        toggle(dd);
      });

    g.append("text")
      .attr("class", "node-expand-icon")
      .attr("x", 0).attr("y", halfH + 14)
      .text(collapsed ? "+" : "−");

    if (count > 0) {
      g.append("text")
        .attr("class", "node-count")
        .attr("x", 16).attr("y", halfH + 18)
        .text(count);
    }
  });

  const nodeUpdate = nodeEnter.merge(nodeSel);

  nodeUpdate
    .classed("dept-dimmed", d => activeDepts.size < 6 && !activeDepts.has(d.data.dept));

  nodeUpdate
    .transition().duration(400).ease(d3.easeCubicOut)
    .attr("transform", d => `translate(${d.x},${d.y})`)
    .style("opacity", function(d) {
      if (activeDepts.size < 6 && !activeDepts.has(d.data.dept)) return 0.12;
      return 1;
    });

  gLinks.selectAll(".link")
    .classed("dept-dimmed", d =>
      activeDepts.size < 6 &&
      !activeDepts.has(d.target.data.dept) &&
      !activeDepts.has(d.source.data.dept)
    );

  nodeUpdate.select(".node-expand-icon")
    .text(d => d._children ? "+" : (d.children ? "−" : ""));

  nodeUpdate.select(".node-count")
    .text(d => {
      const count = countDescendants(d);
      return count > 0 ? count : "";
    });

  nodeUpdate.select(".node-card")
    .attr("stroke", d => {
      if (d.data._highlighted) return DEPT_COLORS[d.data.dept];
      return null;
    })
    .attr("stroke-width", d => d.data._highlighted ? 2.5 : 1);

  setTimeout(updateMinimap, 450);
}

function toggle(d) {
  if (d.children) {
    d._children = d.children;
    d.children = null;
  } else if (d._children) {
    d.children = d._children;
    d._children = null;
  }
  update(d);
  if (typeof refreshFocusBarCount === "function") refreshFocusBarCount();
}

function expandAll(d) {
  if (d._children) {
    d.children = d._children;
    d._children = null;
  }
  if (d.children) d.children.forEach(expandAll);
}

function collapseToLevel(d, level) {
  if (d.depth >= level && d.children) {
    d._children = d.children;
    d.children = null;
  }
  if (d.children) d.children.forEach(c => collapseToLevel(c, level));
}

function esc(str) {
  const el = document.createElement("span");
  el.textContent = str;
  return el.innerHTML;
}

function showTooltip(e, d) {
  const kids = d.children || d._children || [];
  const direct = kids.length;
  const total = countDescendants(d);
  const indirect = total - direct;
  const imgUrl = STAFF_IMAGES[d.data.name];
  const name = esc(d.data.name);
  const title = esc(d.data.title);
  const photoHtml = imgUrl
    ? `<div class="tooltip-photo"><img src="${displayImageUrl(imgUrl, 160)}" alt="${name}" /></div>`
    : "";
  let reportsHtml = "";
  if (total > 0) {
    const label = total === 1 ? "report" : "reports";
    reportsHtml = indirect > 0
      ? `<div class="tooltip-reports">${total} ${label} (${direct} direct + ${indirect} indirect)</div>`
      : `<div class="tooltip-reports">${direct} direct ${label}</div>`;
  }
  tooltip.innerHTML = `
    ${photoHtml}
    <div class="tooltip-name">${name}</div>
    <div class="tooltip-title">${title}</div>
    <span class="tooltip-dept" style="background:${DEPT_COLORS[d.data.dept]}">${DEPT_LABELS[d.data.dept]}</span>
    ${reportsHtml}
  `;
  tooltip.classList.add("visible");
  moveTooltip(e);
}

function moveTooltip(e) {
  const pad = 12;
  let x = e.clientX + pad;
  let y = e.clientY + pad;
  const rect = tooltip.getBoundingClientRect();
  if (x + rect.width > window.innerWidth - pad) x = e.clientX - rect.width - pad;
  if (y + rect.height > window.innerHeight - pad) y = e.clientY - rect.height - pad;
  tooltip.style.left = x + "px";
  tooltip.style.top = y + "px";
}

function hideTooltip() {
  tooltip.classList.remove("visible");
}

function fitToScreen() {
  const bounds = gMain.node().getBBox();
  const w = container.clientWidth;
  const h = container.clientHeight;
  const scale = Math.min(
    (w - 80) / bounds.width,
    (h - 80) / bounds.height,
    1
  );
  const tx = w / 2 - (bounds.x + bounds.width / 2) * scale;
  const ty = h / 2 - (bounds.y + bounds.height / 2) * scale;
  svgEl.transition().duration(500).ease(d3.easeCubicOut)
    .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
}

function zoomToNode(d) {
  const w = container.clientWidth;
  const h = container.clientHeight;
  const scale = 1;
  const tx = w / 2 - d.x * scale;
  const ty = h / 2 - d.y * scale;
  svgEl.transition().duration(600).ease(d3.easeCubicOut)
    .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
}

function expandPathTo(d) {
  const ancestors = d.ancestors().reverse();
  ancestors.forEach(a => {
    if (a._children) {
      a.children = a._children;
      a._children = null;
    }
  });
  update(root);
}

// Search
function buildFlatList() {
  const flat = [];
  function walk(node) {
    flat.push(node);
    (node.children || node._children || []).forEach(walk);
  }
  walk(root);
  return flat;
}

function highlightMatch(text, query) {
  const idx = text.toLowerCase().indexOf(query.toLowerCase());
  if (idx === -1) return text;
  return text.slice(0, idx) + "<mark>" + text.slice(idx, idx + query.length) + "</mark>" + text.slice(idx + query.length);
}

let searchResultNodes = [];
let activeResultIdx = -1;

searchBox.addEventListener("input", () => {
  const q = searchBox.value.trim();
  if (q.length < 2) {
    searchResults.classList.remove("visible");
    searchResults.innerHTML = "";
    searchBox.setAttribute("aria-expanded", "false");
    clearHighlights();
    return;
  }
  const flat = buildFlatList();
  searchResultNodes = flat.filter(d =>
    d.data.name.toLowerCase().includes(q.toLowerCase()) ||
    d.data.title.toLowerCase().includes(q.toLowerCase())
  );
  activeResultIdx = -1;

  if (searchResultNodes.length === 0) {
    searchResults.innerHTML = `<div style="padding:14px;color:var(--text-3);font-size:13px;">No results found</div>`;
    searchResults.classList.add("visible");
    searchBox.setAttribute("aria-expanded", "true");
    return;
  }

  searchResults.innerHTML = searchResultNodes.map((d, i) => `
    <div class="search-result-item" role="option" id="search-opt-${i}" data-idx="${i}">
      <div class="sr-name">${highlightMatch(d.data.name, q)}</div>
      <div class="sr-title">${highlightMatch(d.data.title, q)}</div>
    </div>
  `).join("");
  searchResults.classList.add("visible");
  searchBox.setAttribute("aria-expanded", "true");

  searchResults.querySelectorAll(".search-result-item").forEach(el => {
    el.addEventListener("click", () => {
      const idx = parseInt(el.dataset.idx);
      selectSearchResult(idx);
    });
  });
});

searchBox.addEventListener("keydown", (e) => {
  if (!searchResultNodes.length) return;
  if (e.key === "ArrowDown") {
    e.preventDefault();
    activeResultIdx = Math.min(activeResultIdx + 1, searchResultNodes.length - 1);
    updateActiveResult();
  } else if (e.key === "ArrowUp") {
    e.preventDefault();
    activeResultIdx = Math.max(activeResultIdx - 1, 0);
    updateActiveResult();
  } else if (e.key === "Enter" && activeResultIdx >= 0) {
    e.preventDefault();
    selectSearchResult(activeResultIdx);
  } else if (e.key === "Escape") {
    searchResults.classList.remove("visible");
    searchBox.setAttribute("aria-expanded", "false");
    searchBox.value = "";
    searchResultNodes = [];
    clearHighlights();
    searchBox.blur();
  }
});

function updateActiveResult() {
  searchResults.querySelectorAll(".search-result-item").forEach((el, i) => {
    el.classList.toggle("active", i === activeResultIdx);
    el.setAttribute("aria-selected", i === activeResultIdx ? "true" : "false");
    if (i === activeResultIdx) el.scrollIntoView({ block: "nearest" });
  });
  searchBox.setAttribute("aria-activedescendant",
    activeResultIdx >= 0 ? `search-opt-${activeResultIdx}` : "");
}

function selectSearchResult(idx) {
  const d = searchResultNodes[idx];
  clearHighlights();
  d.data._highlighted = true;
  expandPathTo(d);
  showFocusBar(d);
  setTimeout(() => {
    zoomToNode(d);
    update(root);
    setHashForNode(d);
  }, 100);
  searchResults.classList.remove("visible");
  searchBox.setAttribute("aria-expanded", "false");
}

function clearHighlights() {
  buildFlatList().forEach(d => { d.data._highlighted = false; });
  update(root);
}

document.addEventListener("click", (e) => {
  if (!e.target.closest(".search-wrap")) {
    searchResults.classList.remove("visible");
    searchBox.setAttribute("aria-expanded", "false");
  }
});

document.getElementById("btn-collapse").addEventListener("click", () => {

// --- Focus (click node) ---
function focusNode(d) {
  if (d._children) {
    d.children = d._children;
    d._children = null;
  }
  buildFlatList().forEach(n => { n.data._highlighted = false; });
  d.data._highlighted = true;
  update(d);
  showFocusBar(d);
  setTimeout(() => {
    zoomToNode(d);
    setHashForNode(d);
  }, 50);
}

// --- URL hash deep-linking ---
function slugify(name) {
  return String(name)
    .toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
    .replace(/[^a-z0-9]+/g, "-")
    .replace(/^-+|-+$/g, "");
}
function nodeToSlug(d) {
  if (d.data.name === "VACANCY") return "vacancy-" + slugify(d.data.title) + "-" + d.data._id;
  return slugify(d.data.name);
}
function parseHash() {
  const h = decodeURIComponent((location.hash || "").replace(/^#/, ""));
  const params = {};
  if (!h) return params;
  h.split("&").forEach(p => {
    const [k, v] = p.split("=");
    if (v === undefined) params.person = k;
    else params[k] = v;
  });
  return params;
}
let suppressHashWrite = false;
function writeHash(params) {
  const parts = [];
  if (params.person) parts.push(encodeURIComponent(params.person));
  if (params.filter) parts.push("filter=" + encodeURIComponent(params.filter));
  const next = parts.length ? "#" + parts.join("&") : "";
  if (next !== location.hash) {
    suppressHashWrite = true;
    history.replaceState(null, "", next || location.pathname + location.search);
  }
}
function setHashForNode(d) {
  const cur = parseHash();
  writeHash({ person: nodeToSlug(d), filter: cur.filter });
  if (d.data.name !== "VACANCY") {
    document.title = `${d.data.name} — CAI Org Chart`;
  }
}
function findNodeBySlug(slug) {
  let found = null;
  root.each(d => { if (!found && nodeToSlug(d) === slug) found = d; });
  return found;
}
function applyHash() {
  const params = parseHash();
  if (params.filter) {
    const depts = params.filter.split(",").filter(x => ALL_DEPTS.includes(x));
    if (depts.length > 0 && depts.length < 6) {
      activeDepts.clear();
      depts.forEach(dd => activeDepts.add(dd));
      syncLegendUI();
    }
  }
  if (params.person) {
    const d = findNodeBySlug(params.person);
    if (d) {
      expandPathTo(d);
      clearHighlights();
      d.data._highlighted = true;
      showFocusBar(d);
      update(d);
      setTimeout(() => zoomToNode(d), 200);
      return true;
    }
  }
  return false;
}
window.addEventListener("hashchange", () => {
  if (suppressHashWrite) { suppressHashWrite = false; return; }
  applyHash();
});

// --- Department filter (legend) ---
function syncLegendUI() {
  document.querySelectorAll(".legend-item[data-dept]").forEach(btn => {
    const on = activeDepts.has(btn.dataset.dept);
    btn.classList.toggle("inactive", !on);
    btn.setAttribute("aria-pressed", on ? "true" : "false");
  });
}
function updateFilterHash() {
  const cur = parseHash();
  const person = cur.person;
  const isAll = activeDepts.size === 6;
  writeHash({
    person,
    filter: isAll ? undefined : ALL_DEPTS.filter(d => activeDepts.has(d)).join(",")
  });
}
function applyDeptFilter() {
  syncLegendUI();
  updateFilterHash();
  updateHeadcount();
  update(root);
}
document.querySelectorAll(".legend-item[data-dept]").forEach(btn => {
  btn.addEventListener("click", (e) => {
    const dept = btn.dataset.dept;
    if (e.shiftKey || e.altKey) {
      activeDepts.clear();
      activeDepts.add(dept);
    } else if (activeDepts.size === 6) {
      activeDepts.clear();
      activeDepts.add(dept);
    } else if (activeDepts.has(dept)) {
      activeDepts.delete(dept);
      if (activeDepts.size === 0) ALL_DEPTS.forEach(d => activeDepts.add(d));
    } else {
      activeDepts.add(dept);
    }
    applyDeptFilter();
  });
});
document.getElementById("legend-reset").addEventListener("click", () => {
  activeDepts.clear();
  ALL_DEPTS.forEach(d => activeDepts.add(d));
  applyDeptFilter();
});

// --- Headcount ---
function updateHeadcount() {
  const all = [];
  root.each(d => all.push(d));
  const total = all.filter(d => d.data.name !== "VACANCY").length;
  const vac = all.filter(d => d.data.name === "VACANCY").length;
  const shown = activeDepts.size === 6
    ? total
    : all.filter(d => activeDepts.has(d.data.dept) && d.data.name !== "VACANCY").length;
  const el = document.getElementById("headcount");
  if (activeDepts.size === 6) {
    el.innerHTML = `<strong>${total}</strong> people · <strong>${vac}</strong> open`;
  } else {
    el.innerHTML = `<strong>${shown}</strong> of ${total} shown`;
  }
}

// --- Dark mode ---
const themeBtn = document.getElementById("btn-theme");
function applyTheme(theme) {
  document.documentElement.setAttribute("data-theme", theme);
  themeBtn.querySelector(".icon-sun").style.display = theme === "dark" ? "none" : "";
  themeBtn.querySelector(".icon-moon").style.display = theme === "dark" ? "" : "none";
}
function initTheme() {
  const saved = localStorage.getItem("cai-theme");
  if (saved === "dark" || saved === "light") {
    applyTheme(saved);
    return;
  }
  const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
  applyTheme(prefersDark ? "dark" : "light");
}
themeBtn.addEventListener("click", () => {
  const cur = document.documentElement.getAttribute("data-theme") === "dark" ? "dark" : "light";
  const next = cur === "dark" ? "light" : "dark";
  applyTheme(next);
  localStorage.setItem("cai-theme", next);
});
initTheme();

// --- PNG Export & Print ---
const imageDataCache = {};
function proxyImageUrl(url, size) {
  if (url.startsWith("data:")) return url;
  const stripped = url.replace(/^https?:\/\//, "");
  const px = size || 160;
  return `https://images.weserv.nl/?url=${encodeURIComponent(stripped)}&w=${px}&h=${px}&fit=cover&output=jpg&q=82`;
}
function displayImageUrl(url, size) {
  if (!url || url.startsWith("data:")) return url;
  return proxyImageUrl(url, size);
}
function loadImage(src, useCors) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    if (useCors) img.crossOrigin = "anonymous";
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = src;
  });
}
async function imageToDataUrl(url) {
  if (!url) return null;
  if (imageDataCache[url] !== undefined) return imageDataCache[url];
  const attempt = async (src) => {
    const img = await loadImage(src, true);
    const c = document.createElement("canvas");
    c.width = img.naturalWidth || 256;
    c.height = img.naturalHeight || 256;
    const ctx = c.getContext("2d");
    ctx.drawImage(img, 0, 0);
    return c.toDataURL("image/png");
  };
  let data = null;
  try { data = await attempt(url); }
  catch (err1) {
    try { data = await attempt(proxyImageUrl(url)); }
    catch (err2) {
      console.warn("[export] image load failed:", url, err2);
      data = null;
    }
  }
  imageDataCache[url] = data;
  return data;
}

function inlineSvgStyles(sourceSvg) {
  const clone = sourceSvg.cloneNode(true);
  const allEls = clone.querySelectorAll("*");
  const sourceEls = sourceSvg.querySelectorAll("*");
  const propsToCopy = [
    "fill","stroke","stroke-width","stroke-dasharray","stroke-opacity",
    "fill-opacity","opacity","font-size","font-weight","font-family","font-style",
    "text-anchor","dominant-baseline","rx","ry"
  ];
  sourceEls.forEach((el, i) => {
    const cs = getComputedStyle(el);
    const target = allEls[i];
    if (!target) return;
    propsToCopy.forEach(p => {
      const v = cs.getPropertyValue(p);
      if (!v) return;
      if ((p === "opacity" || p === "fill-opacity" || p === "stroke-opacity") && v === "1") return;
      target.style.setProperty(p, v);
    });
  });
  return clone;
}

function subtreeIds(rootNode) {
  const ids = new Set();
  function walk(n) {
    ids.add(n.data._id);
    (n.children || n._children || []).forEach(walk);
  }
  walk(rootNode);
  return ids;
}

function computeSubtreeBounds(rootNode) {
  const ids = subtreeIds(rootNode);
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  d3.selectAll(".node-group").each(function(d) {
    if (!ids.has(d.data._id)) return;
    const bb = this.getBBox();
    const t = d3.select(this).attr("transform");
    const m = t ? t.match(/translate\(([^,]+),([^)]+)\)/) : null;
    const tx = m ? parseFloat(m[1]) : 0;
    const ty = m ? parseFloat(m[2]) : 0;
    minX = Math.min(minX, tx + bb.x);
    minY = Math.min(minY, ty + bb.y);
    maxX = Math.max(maxX, tx + bb.x + bb.width);
    maxY = Math.max(maxY, ty + bb.y + bb.height);
  });
  if (!isFinite(minX)) return gMain.node().getBBox();
  return { x: minX, y: minY, width: maxX - minX, height: maxY - minY };
}

async function renderChartPng({ subtreeRoot } = {}) {
  const bounds = subtreeRoot ? computeSubtreeBounds(subtreeRoot) : gMain.node().getBBox();
  const pad = 40;
  const w = Math.max(bounds.width + pad * 2, 600);
  const h = Math.max(bounds.height + pad * 2, 400);
  const scale = 2;

  const isDark = document.documentElement.getAttribute("data-theme") === "dark";
  const bg = isDark ? "#071A30" : "#FFFFFF";

  const clone = inlineSvgStyles(svgEl.node());
  clone.setAttribute("xmlns", "http://www.w3.org/2000/svg");
  clone.setAttribute("xmlns:xlink", "http://www.w3.org/1999/xlink");
  clone.setAttribute("width", w);
  clone.setAttribute("height", h);
  clone.setAttribute("viewBox", `${bounds.x - pad} ${bounds.y - pad} ${w} ${h}`);

  const gMainClone = clone.querySelector("g");
  if (gMainClone) gMainClone.removeAttribute("transform");

  if (subtreeRoot) {
    const keep = subtreeIds(subtreeRoot);
    const realNodes = Array.from(svgEl.node().querySelectorAll(".node-group"));
    const cloneNodes = Array.from(clone.querySelectorAll(".node-group"));
    realNodes.forEach((real, i) => {
      const d = d3.select(real).datum();
      const cloneEl = cloneNodes[i];
      if (!cloneEl) return;
      if (!d || !keep.has(d.data._id)) cloneEl.remove();
    });
    const realLinks = Array.from(svgEl.node().querySelectorAll(".link"));
    const cloneLinks = Array.from(clone.querySelectorAll(".link"));
    realLinks.forEach((real, i) => {
      const d = d3.select(real).datum();
      const cloneEl = cloneLinks[i];
      if (!cloneEl) return;
      const keepLink = d
        && keep.has(d.source.data._id)
        && keep.has(d.target.data._id);
      if (!keepLink) cloneEl.remove();
    });
  } else {
    clone.querySelectorAll(".node-group.dept-dimmed").forEach(n => n.remove());
    clone.querySelectorAll(".link.dept-dimmed").forEach(n => n.remove());
  }

  const imageEls = Array.from(clone.querySelectorAll(".node-avatar-img"));
  const uniqueUrls = Array.from(new Set(
    imageEls
      .map(el => el.getAttribute("href") || el.getAttribute("xlink:href"))
      .filter(Boolean)
  ));
  const urlToData = {};
  await Promise.all(uniqueUrls.map(async u => {
    const data = await imageToDataUrl(u);
    if (data) urlToData[u] = data;
  }));

  const XLINK = "http://www.w3.org/1999/xlink";
  imageEls.forEach(el => {
    const src = el.getAttribute("href") || el.getAttributeNS(XLINK, "href");
    const data = urlToData[src];
    if (data) {
      el.setAttribute("href", data);
      el.setAttributeNS(XLINK, "xlink:href", data);
    } else {
      el.remove();
    }
  });

  clone.querySelectorAll(".node-group").forEach(g => {
    if (g.querySelector(".node-avatar-img")) return;
    if (g.querySelector(".node-avatar-fallback")) return;
    const cp = g.querySelector("clipPath circle");
    if (!cp) return;
    const cx = cp.getAttribute("cx");
    const cy = cp.getAttribute("cy");
    const r = cp.getAttribute("r");
    const nameEl = g.querySelector(".node-name");
    const name = nameEl ? nameEl.textContent : "";
    const initials = name.split(/\s+/).filter(Boolean).slice(0,2).map(s => s[0].toUpperCase()).join("");
    const ns = "http://www.w3.org/2000/svg";
    const c = document.createElementNS(ns, "circle");
    c.setAttribute("cx", cx); c.setAttribute("cy", cy); c.setAttribute("r", r);
    c.setAttribute("fill", "#E2E8F0");
    c.setAttribute("stroke", "#CBD5E1");
    g.insertBefore(c, g.querySelector(".node-avatar-ring") || null);
    const t = document.createElementNS(ns, "text");
    t.setAttribute("x", cx); t.setAttribute("y", cy);
    t.setAttribute("text-anchor", "middle");
    t.setAttribute("dominant-baseline", "central");
    t.style.fontSize = "14px";
    t.style.fontWeight = "600";
    t.style.fill = "#64748B";
    t.textContent = initials;
    g.insertBefore(t, g.querySelector(".node-avatar-ring") || null);
  });

  const xml = new XMLSerializer().serializeToString(clone);
  const svgBlob = new Blob(['<?xml version="1.0" encoding="UTF-8"?>', xml], { type: "image/svg+xml;charset=utf-8" });
  const url = URL.createObjectURL(svgBlob);

  const img = new Image();
  img.decoding = "sync";
  await new Promise((res, rej) => { img.onload = res; img.onerror = rej; img.src = url; });

  const canvas = document.createElement("canvas");
  canvas.width = Math.round(w * scale);
  canvas.height = Math.round(h * scale);
  const ctx = canvas.getContext("2d");
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
  URL.revokeObjectURL(url);

  return new Promise(resolve => canvas.toBlob(blob => resolve(blob), "image/png"));
}

function fileLabelForScope(subtreeRoot) {
  if (subtreeRoot) return "team-" + slugify(subtreeRoot.data.name);
  if (activeDepts.size < 6) return ALL_DEPTS.filter(d => activeDepts.has(d)).join("-");
  return "all";
}

async function downloadPng(subtreeRoot) {
  const blob = await renderChartPng({ subtreeRoot });
  const dt = new Date().toISOString().slice(0,10);
  const filename = `cai-orgchart-${fileLabelForScope(subtreeRoot)}-${dt}.png`;
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = filename;
  document.body.appendChild(link);
  link.click();
  setTimeout(() => { URL.revokeObjectURL(link.href); link.remove(); }, 100);
}

async function printScope(subtreeRoot) {
  if (!subtreeRoot) {
    window.print();
    return;
  }
  const blob = await renderChartPng({ subtreeRoot });
  const url = URL.createObjectURL(blob);
  const title = `${subtreeRoot.data.name}'s team — CAI Org Chart`;
  const win = window.open("", "_blank");
  if (!win) {
    alert("Please allow popups to print this team.");
    URL.revokeObjectURL(url);
    return;
  }
  win.document.write(`<!doctype html><html><head><title>${esc(title)}</title>
    <style>
      @page { size: landscape; margin: 0.5in; }
      html, body { margin: 0; padding: 0; background: #fff; font-family: -apple-system, system-ui, sans-serif; }
      .wrap { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 16px; }
      h1 { font-size: 16px; color: #00274C; margin: 0 0 12px; font-weight: 600; }
      img { max-width: 100%; max-height: calc(100vh - 80px); object-fit: contain; }
      @media print { h1 { display: none; } .wrap { min-height: auto; padding: 0; } }
    </style></head>
    <body><div class="wrap"><h1>${esc(title)}</h1><img id="img" alt="${esc(title)}" /></div>
    <script>
      const img = document.getElementById('img');
      img.onload = () => { setTimeout(() => { window.focus(); window.print(); }, 100); };
      img.src = ${JSON.stringify(url)};
      window.onafterprint = () => { try { URL.revokeObjectURL(${JSON.stringify(url)}); } catch(e){} window.close(); };
    <\/script></body></html>`);
  win.document.close();
}

async function runWithBusy(btn, fn) {
  const orig = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = `<span>Working…</span>`;
  try { await fn(); }
  catch (err) {
    console.error("Export/print failed:", err);
    alert("That didn't work. Try a different browser or use Print → Save as PDF.");
  }
  finally { btn.disabled = false; btn.innerHTML = orig; }
}

document.getElementById("btn-print").addEventListener("click", () => printScope(null));
document.getElementById("btn-export").addEventListener("click", (e) => {
  runWithBusy(e.currentTarget, () => downloadPng(null));
});

// --- Focus bar (per-team print/export) ---
const focusBar = document.getElementById("focus-bar");
const focusBarName = document.getElementById("focus-bar-name");
const focusBarCount = document.getElementById("focus-bar-count");
let focusedNode = null;

function countVisibleDescendants(d) {
  if (!d.children) return 0;
  let c = d.children.length;
  d.children.forEach(ch => c += countVisibleDescendants(ch));
  return c;
}
function refreshFocusBarCount() {
  if (!focusedNode) return;
  const visible = countVisibleDescendants(focusedNode) + 1;
  const total = countDescendants(focusedNode) + 1;
  focusBarCount.textContent = visible === total
    ? `· ${visible} people`
    : `· ${visible} of ${total} shown`;
}
function showFocusBar(d) {
  focusedNode = d;
  focusBarName.textContent = d.data.name === "VACANCY" ? d.data.title : d.data.name;
  refreshFocusBarCount();
  focusBar.classList.add("visible");
}
function hideFocusBar() {
  focusedNode = null;
  focusBar.classList.remove("visible");
}

document.getElementById("focus-clear").addEventListener("click", () => {
  clearHighlights();
  hideFocusBar();
  const cur = parseHash();
  writeHash({ filter: cur.filter });
  document.title = "CAI Org Chart — Center for Academic Innovation";
});
document.getElementById("focus-print").addEventListener("click", (e) => {
  if (!focusedNode) return;
  runWithBusy(e.currentTarget, () => printScope(focusedNode));
});
document.getElementById("focus-png").addEventListener("click", (e) => {
  if (!focusedNode) return;
  runWithBusy(e.currentTarget, () => downloadPng(focusedNode));
});

// Minimap
const minimapSvg = d3.select("#minimap-container").append("svg");
const gMini = minimapSvg.append("g");
const gMiniNodes = gMini.append("g");
const miniViewport = gMini.append("rect").attr("class", "minimap-viewport");

function updateMinimap() {
  const bounds = gMain.node().getBBox();
  if (!bounds.width) return;

  const mW = 200;
  const mH = 140;
  const pad = 10;
  const scale = Math.min((mW - pad * 2) / bounds.width, (mH - pad * 2) / bounds.height);
  const tx = mW / 2 - (bounds.x + bounds.width / 2) * scale;
  const ty = mH / 2 - (bounds.y + bounds.height / 2) * scale;
  gMini.attr("transform", `translate(${tx},${ty}) scale(${scale})`);

  const allN = root.descendants();
  const isFiltered = activeDepts.size < 6;
  const neutralColor = getComputedStyle(document.documentElement).getPropertyValue("--text-3").trim() || "#6B7B8D";
  const dimColor = getComputedStyle(document.documentElement).getPropertyValue("--border").trim() || "#E2E8F0";
  const dots = gMiniNodes.selectAll("rect").data(allN, d => d.data._id);
  dots.exit().remove();
  dots.enter().append("rect")
    .attr("class", "minimap-node")
    .attr("width", 8 / scale).attr("height", 4 / scale)
    .attr("rx", 2 / scale)
    .merge(dots)
    .attr("x", d => d.x - 4 / scale)
    .attr("y", d => d.y - 2 / scale)
    .attr("fill", d => {
      if (!isFiltered) return neutralColor;
      return activeDepts.has(d.data.dept) ? DEPT_COLORS[d.data.dept] : dimColor;
    })
    .attr("fill-opacity", d => {
      if (!isFiltered) return 0.55;
      return activeDepts.has(d.data.dept) ? 0.9 : 0.35;
    });

  const t = d3.zoomTransform(svgEl.node());
  const cw = container.clientWidth;
  const ch = container.clientHeight;
  miniViewport
    .attr("x", -t.x / t.k)
    .attr("y", -t.y / t.k)
    .attr("width", cw / t.k)
    .attr("height", ch / t.k);
}

document.addEventListener("keydown", (e) => {
  if (e.target.tagName === "INPUT") return;
  if (e.key === "/" || (e.key === "f" && (e.metaKey || e.ctrlKey))) {
    e.preventDefault();
    searchBox.focus();
  }
});

// Init
const hadDeepLink = applyHash();
updateHeadcount();
update(root);
setTimeout(() => {
  if (!hadDeepLink) fitToScreen();
}, 100);

let resizeTimer;
window.addEventListener("resize", () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(fitToScreen, 150);
});
</script>
