<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      --bg: #F4F6F9;
      --surface: #FFFFFF;
      --text-1: #0D1823;
      --text-2: #4A5568;
      --text-3: #8896A6;
      --border: #E2E8F0;
      --link-color: #94A3B8;

      --c-executive: #6366F1;
      --c-learning: #0EA5E9;
      --c-technology: #10B981;
      --c-operations: #F59E0B;
      --c-marketing: #EC4899;
      --c-solutions: #8B5CF6;

      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      --ease: cubic-bezier(.4,0,.2,1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    .sr-only {
      position: absolute; width: 1px; height: 1px;
      padding: 0; margin: -1px; overflow: hidden;
      clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: var(--font);
      color: var(--text-1);
      -webkit-text-size-adjust: 100%;
    }

    #toolbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      background: rgba(244,246,249,0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }

    #toolbar h1 {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text-1);
      white-space: nowrap;
    }

    #toolbar .subtitle {
      font-size: 12px;
      color: var(--text-3);
      white-space: nowrap;
    }

    .toolbar-spacer { flex: 1; }

    #search-box {
      width: 260px;
      padding: 8px 12px 8px 36px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 16px;
      font-family: var(--font);
      background: var(--surface);
      color: var(--text-1);
      outline: none;
      transition: border-color 200ms var(--ease), box-shadow 200ms var(--ease);
    }
    #search-box:focus {
      border-color: var(--c-executive);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
    }
    #search-box::placeholder { color: var(--text-3); }

    .search-wrap {
      position: relative;
    }
    .search-wrap svg {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: var(--text-3);
    }

    .search-results {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      width: 320px;
      max-height: 340px;
      overflow-y: auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 8px 32px rgba(13,24,35,0.12);
      z-index: 200;
    }
    .search-results.visible { display: block; }
    .search-result-item {
      padding: 10px 14px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 120ms var(--ease);
    }
    .search-result-item:last-child { border-bottom: none; }
    .search-result-item:hover, .search-result-item.active {
      background: #F0F4FF;
    }
    .search-result-item .sr-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-1);
    }
    .search-result-item .sr-title {
      font-size: 12px;
      color: var(--text-2);
      margin-top: 2px;
    }
    .search-result-item mark {
      background: rgba(99,102,241,0.2);
      color: inherit;
      border-radius: 2px;
      padding: 0 1px;
    }

    .btn-group {
      display: flex;
      gap: 4px;
    }

    .btn-icon {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      cursor: pointer;
      color: var(--text-2);
      transition: all 150ms var(--ease);
    }
    .btn-icon:hover { background: #EEF2FF; color: var(--c-executive); border-color: #C7D2FE; }
    .btn-icon:active { transform: scale(0.95); }
    .btn-icon:focus-visible, .btn-text:focus-visible {
      outline: 2px solid var(--c-executive);
      outline-offset: 2px;
    }

    .btn-text {
      height: 44px;
      padding: 0 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      cursor: pointer;
      color: var(--text-2);
      font-size: 13px;
      font-family: var(--font);
      font-weight: 500;
      white-space: nowrap;
      transition: all 150ms var(--ease);
    }
    .btn-text:hover { background: #EEF2FF; color: var(--c-executive); border-color: #C7D2FE; }
    .btn-text:active { transform: scale(0.97); }

    #chart-container {
      width: 100%;
      height: 100%;
      padding-top: 60px;
    }

    #chart-container svg {
      width: 100%;
      height: 100%;
    }

    .node-group { cursor: pointer; }

    .node-card {
      fill: var(--surface);
      stroke: var(--border);
      stroke-width: 1;
      rx: 10;
      ry: 10;
      filter: url(#cardShadow);
      transition: filter 200ms var(--ease);
    }

    .node-group:hover .node-card {
      filter: url(#cardShadowHover);
    }

    .node-group.highlighted .node-card {
      stroke-width: 2.5;
      filter: url(#cardShadowHover);
    }

    .node-accent {
      rx: 10; ry: 10;
    }

    .node-name {
      font-size: 13px;
      font-weight: 600;
      fill: var(--text-1);
      font-family: var(--font);
    }

    .node-title {
      font-size: 11px;
      fill: var(--text-2);
      font-family: var(--font);
    }

    .node-badge {
      font-size: 9px;
      font-weight: 600;
      fill: white;
      font-family: var(--font);
    }

    .node-count {
      font-size: 10px;
      font-weight: 600;
      fill: var(--text-3);
      font-family: var(--font);
    }

    .node-expand {
      fill: var(--bg);
      stroke: var(--border);
      stroke-width: 1;
      cursor: pointer;
    }
    .node-expand-hit {
      fill: transparent;
      cursor: pointer;
    }
    .node-expand-icon {
      fill: var(--text-3);
      font-size: 14px;
      font-family: var(--font);
      font-weight: 400;
      text-anchor: middle;
      dominant-baseline: central;
      pointer-events: none;
    }

    .link {
      fill: none;
      stroke: var(--link-color);
      stroke-width: 1.5;
      stroke-opacity: 0.5;
    }

    .vacancy .node-name {
      fill: var(--text-3);
      font-style: italic;
    }

    .minimap-container {
      position: fixed;
      bottom: 16px;
      right: 16px;
      width: 200px;
      height: 140px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 4px 16px rgba(13,24,35,0.08);
      overflow: hidden;
      z-index: 90;
    }
    .minimap-container svg {
      width: 100%; height: 100%;
    }
    .minimap-viewport {
      fill: rgba(99,102,241,0.08);
      stroke: var(--c-executive);
      stroke-width: 1.5;
    }

    .legend {
      position: fixed;
      bottom: 16px;
      left: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 10px 14px;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 4px 16px rgba(13,24,35,0.06);
      z-index: 90;
      max-width: 500px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-2);
      white-space: nowrap;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 3px;
    }

    .tooltip {
      display: none;
      position: fixed;
      z-index: 300;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 8px 32px rgba(13,24,35,0.14);
      padding: 14px 16px;
      max-width: 280px;
      pointer-events: none;
    }
    .tooltip.visible { display: block; }
    .tooltip-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-1);
      margin-bottom: 4px;
    }
    .tooltip-title {
      font-size: 13px;
      color: var(--text-2);
      margin-bottom: 8px;
      line-height: 1.4;
    }
    .tooltip-dept {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 4px;
      color: white;
    }
    .tooltip-reports {
      font-size: 12px;
      color: var(--text-3);
      margin-top: 6px;
    }

    @media (max-width: 900px) {
      #toolbar { padding: 10px 12px; gap: 8px; }
      #toolbar h1 { font-size: 13px; }
      #toolbar .subtitle { display: none; }
      #search-box { width: 180px; font-size: 16px; }
      .legend { bottom: 8px; left: 8px; padding: 8px 10px; }
      .minimap-container { width: 150px; height: 100px; }
    }

    @media (max-width: 640px) {
      #toolbar { flex-wrap: wrap; padding: 8px 12px; gap: 6px; }
      #toolbar h1 { font-size: 13px; order: 0; }
      .toolbar-spacer { display: none; }
      .search-wrap { order: 10; flex: 1 1 100%; }
      #search-box { width: 100%; font-size: 16px; }
      .search-results { width: 100%; }
      .btn-group { order: 2; }
      .btn-text span { display: none; }
      .btn-text { padding: 0 10px; min-width: 44px; justify-content: center; }
      .minimap-container { display: none; }
      .legend { max-width: calc(100vw - 16px); }
      #chart-container { padding-top: 100px; }
    }
  </style>
</head>

  <div class="btn-group">

</div>

<div id="chart-container"></div>

const DEPT_COLORS = {
  executive: "#6366F1",
  learning: "#0EA5E9",
  technology: "#10B981",
  operations: "#F59E0B",
  marketing: "#EC4899",
  solutions: "#8B5CF6"
};

const DEPT_LABELS = {
  executive: "Executive",
  learning: "Learning",
  technology: "Technology",
  operations: "Operations",
  marketing: "Marketing",
  solutions: "Education Solutions"
};

const NODE_W = 220;
const NODE_H = 64;
const MARGIN = { top: 40, right: 60, bottom: 40, left: 60 };

const container = document.getElementById("chart-container");
const svgEl = d3.select(container).append("svg")
  .attr("role", "img")
  .attr("aria-label", "Center for Academic Innovation organizational chart");
const defs = svgEl.append("defs");

defs.append("filter")
  .attr("id", "cardShadow")
  .attr("x", "-10%").attr("y", "-10%").attr("width", "120%").attr("height", "130%")
  .append("feDropShadow")
  .attr("dx", 0).attr("dy", 2).attr("stdDeviation", 4)
  .attr("flood-color", "rgba(13,24,35,0.08)");

defs.append("filter")
  .attr("id", "cardShadowHover")
  .attr("x", "-10%").attr("y", "-10%").attr("width", "120%").attr("height", "140%")
  .append("feDropShadow")
  .attr("dx", 0).attr("dy", 4).attr("stdDeviation", 8)
  .attr("flood-color", "rgba(13,24,35,0.14)");

const gMain = svgEl.append("g");
const gLinks = gMain.append("g").attr("class", "links-layer");
const gNodes = gMain.append("g").attr("class", "nodes-layer");

const zoom = d3.zoom()
  .scaleExtent([0.15, 2])
  .filter(event => {
    if (event.type === "wheel") return event.ctrlKey || event.metaKey;
    if (event.type === "dblclick") return true;
    return !event.button;
  })
  .on("zoom", (e) => {
    gMain.attr("transform", e.transform);
    updateMinimap();
  });
svgEl.call(zoom);

svgEl.node().addEventListener("wheel", (event) => {
  if (event.ctrlKey || event.metaKey) return;
  event.preventDefault();
  const t = d3.zoomTransform(svgEl.node());
  svgEl.call(zoom.transform,
    d3.zoomIdentity
      .translate(t.x - event.deltaX, t.y - event.deltaY)
      .scale(t.k)
  );
}, { passive: false });

const root = d3.hierarchy(ORG_DATA);
let idCounter = 0;
root.each(d => { d.data._id = idCounter++; });

root.each(d => {
  if (d.children && d.depth >= 2) {
    d._children = d.children;
    d.children = null;
  }
});

const tooltip = document.getElementById("tooltip");
const searchBox = document.getElementById("search-box");
const searchResults = document.getElementById("search-results");

let allNodes = [];
root.each(d => allNodes.push(d));

function countDescendants(d) {
  if (!d._children && !d.children) return 0;
  let kids = d._children || d.children || [];
  let count = kids.length;
  kids.forEach(c => { count += countDescendants(c); });
  return count;
}

function truncate(text, maxLen) {
  return text.length > maxLen ? text.slice(0, maxLen - 1) + "…" : text;
}

function update(source) {
  const tree = d3.tree()
    .nodeSize([NODE_W + 24, NODE_H + 60])
    .separation((a, b) => a.parent === b.parent ? 1 : 1.15);

  tree(root);

  const nodes = root.descendants();
  const links = root.links();

  const linkGen = d3.linkVertical()
    .x(d => d.x)
    .y(d => d.y);

  const linkSel = gLinks.selectAll(".link").data(links, d => d.target.data._id);

  linkSel.exit()
    .transition().duration(300)
    .attr("d", () => {
      const o = { x: source.x, y: source.y };
      return linkGen({ source: o, target: o });
    })
    .remove();

  const linkEnter = linkSel.enter()
    .append("path")
    .attr("class", "link")
    .attr("d", () => {
      const o = { x: source.x, y: source.y };
      return linkGen({ source: o, target: o });
    });

  linkEnter.merge(linkSel)
    .transition().duration(400).ease(d3.easeCubicOut)
    .attr("d", linkGen);

  const nodeSel = gNodes.selectAll(".node-group").data(nodes, d => d.data._id);

  nodeSel.exit()
    .transition().duration(300)
    .attr("transform", `translate(${source.x},${source.y})`)
    .style("opacity", 0)
    .remove();

  const nodeEnter = nodeSel.enter()
    .append("g")
    .attr("class", d => `node-group ${d.data.name === "VACANCY" ? "vacancy" : ""}`)
    .attr("transform", `translate(${source.x},${source.y})`)
    .style("opacity", 0)
    .on("click", (e, d) => {
      e.stopPropagation();
      toggle(d);
    })
    .on("mouseenter", (e, d) => showTooltip(e, d))
    .on("mousemove", (e) => moveTooltip(e))
    .on("mouseleave", hideTooltip);

  const halfW = NODE_W / 2;
  const halfH = NODE_H / 2;

  nodeEnter.append("rect")
    .attr("class", "node-card")
    .attr("x", -halfW).attr("y", -halfH)
    .attr("width", NODE_W).attr("height", NODE_H);

  nodeEnter.append("rect")
    .attr("class", "node-accent")
    .attr("x", -halfW).attr("y", -halfH)
    .attr("width", 4).attr("height", NODE_H)
    .attr("fill", d => DEPT_COLORS[d.data.dept]);

  nodeEnter.append("clipPath")
    .attr("id", d => `clip-accent-${d.data._id}`)
    .append("rect")
    .attr("x", -halfW).attr("y", -halfH)
    .attr("width", 4).attr("height", NODE_H)
    .attr("rx", 10).attr("ry", 10);

  nodeEnter.append("text")
    .attr("class", "node-name")
    .attr("x", -halfW + 14).attr("y", -halfH + 24)
    .text(d => truncate(d.data.name, 24));

  nodeEnter.append("text")
    .attr("class", "node-title")
    .attr("x", -halfW + 14).attr("y", -halfH + 42)
    .text(d => truncate(d.data.title, 30));

  nodeEnter.each(function(d) {
    const hasKids = d._children || d.children;
    if (!hasKids) return;
    const g = d3.select(this);
    const collapsed = !!d._children;
    const count = countDescendants(d);

    g.append("circle")
      .attr("class", "node-expand")
      .attr("cx", 0).attr("cy", halfH + 14)
      .attr("r", 11);

    g.append("circle")
      .attr("class", "node-expand-hit")
      .attr("cx", 0).attr("cy", halfH + 14)
      .attr("r", 22);

    g.append("text")
      .attr("class", "node-expand-icon")
      .attr("x", 0).attr("y", halfH + 14)
      .text(collapsed ? "+" : "−");

    if (count > 0) {
      g.append("text")
        .attr("class", "node-count")
        .attr("x", 16).attr("y", halfH + 18)
        .text(count);
    }
  });

  const nodeUpdate = nodeEnter.merge(nodeSel);

  nodeUpdate
    .transition().duration(400).ease(d3.easeCubicOut)
    .attr("transform", d => `translate(${d.x},${d.y})`)
    .style("opacity", 1);

  nodeUpdate.select(".node-expand-icon")
    .text(d => d._children ? "+" : (d.children ? "−" : ""));

  nodeUpdate.select(".node-count")
    .text(d => {
      const count = countDescendants(d);
      return count > 0 ? count : "";
    });

  nodeUpdate.select(".node-card")
    .attr("stroke", d => {
      if (d.data._highlighted) return DEPT_COLORS[d.data.dept];
      return null;
    })
    .attr("stroke-width", d => d.data._highlighted ? 2.5 : 1);

  setTimeout(updateMinimap, 450);
}

function toggle(d) {
  if (d.children) {
    d._children = d.children;
    d.children = null;
  } else if (d._children) {
    d.children = d._children;
    d._children = null;
  }
  update(d);
}

function expandAll(d) {
  if (d._children) {
    d.children = d._children;
    d._children = null;
  }
  if (d.children) d.children.forEach(expandAll);
}

function collapseToLevel(d, level) {
  if (d.depth >= level && d.children) {
    d._children = d.children;
    d.children = null;
  }
  if (d.children) d.children.forEach(c => collapseToLevel(c, level));
}

function showTooltip(e, d) {
  const count = countDescendants(d);
  tooltip.innerHTML = `
    <div class="tooltip-name">${d.data.name}</div>
    <div class="tooltip-title">${d.data.title}</div>
    <span class="tooltip-dept" style="background:${DEPT_COLORS[d.data.dept]}">${DEPT_LABELS[d.data.dept]}</span>
    ${count > 0 ? `<div class="tooltip-reports">${count} report${count !== 1 ? "s" : ""} (direct + indirect)</div>` : ""}
  `;
  tooltip.classList.add("visible");
  moveTooltip(e);
}

function moveTooltip(e) {
  const pad = 12;
  let x = e.clientX + pad;
  let y = e.clientY + pad;
  const rect = tooltip.getBoundingClientRect();
  if (x + rect.width > window.innerWidth - pad) x = e.clientX - rect.width - pad;
  if (y + rect.height > window.innerHeight - pad) y = e.clientY - rect.height - pad;
  tooltip.style.left = x + "px";
  tooltip.style.top = y + "px";
}

function hideTooltip() {
  tooltip.classList.remove("visible");
}

function fitToScreen() {
  const bounds = gMain.node().getBBox();
  const w = container.clientWidth;
  const h = container.clientHeight;
  const scale = Math.min(
    (w - 80) / bounds.width,
    (h - 80) / bounds.height,
    1
  );
  const tx = w / 2 - (bounds.x + bounds.width / 2) * scale;
  const ty = h / 2 - (bounds.y + bounds.height / 2) * scale;
  svgEl.transition().duration(500).ease(d3.easeCubicOut)
    .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
}

function zoomToNode(d) {
  const w = container.clientWidth;
  const h = container.clientHeight;
  const scale = 1;
  const tx = w / 2 - d.x * scale;
  const ty = h / 2 - d.y * scale;
  svgEl.transition().duration(600).ease(d3.easeCubicOut)
    .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
}

function expandPathTo(d) {
  const ancestors = d.ancestors().reverse();
  ancestors.forEach(a => {
    if (a._children) {
      a.children = a._children;
      a._children = null;
    }
  });
  update(root);
}

// Search
function buildFlatList() {
  const flat = [];
  function walk(node) {
    flat.push(node);
    (node.children || node._children || []).forEach(walk);
  }
  walk(root);
  return flat;
}

function highlightMatch(text, query) {
  const idx = text.toLowerCase().indexOf(query.toLowerCase());
  if (idx === -1) return text;
  return text.slice(0, idx) + "<mark>" + text.slice(idx, idx + query.length) + "</mark>" + text.slice(idx + query.length);
}

let searchResultNodes = [];
let activeResultIdx = -1;

searchBox.addEventListener("input", () => {
  const q = searchBox.value.trim();
  if (q.length < 2) {
    searchResults.classList.remove("visible");
    searchResults.innerHTML = "";
    clearHighlights();
    return;
  }
  const flat = buildFlatList();
  searchResultNodes = flat.filter(d =>
    d.data.name.toLowerCase().includes(q.toLowerCase()) ||
    d.data.title.toLowerCase().includes(q.toLowerCase())
  );
  activeResultIdx = -1;

  if (searchResultNodes.length === 0) {
    searchResults.innerHTML = `<div style="padding:14px;color:var(--text-3);font-size:13px;">No results found</div>`;
    searchResults.classList.add("visible");
    return;
  }

  searchResults.innerHTML = searchResultNodes.map((d, i) => `
    <div class="search-result-item" data-idx="${i}">
      <div class="sr-name">${highlightMatch(d.data.name, q)}</div>
      <div class="sr-title">${highlightMatch(d.data.title, q)}</div>
    </div>
  `).join("");
  searchResults.classList.add("visible");

  searchResults.querySelectorAll(".search-result-item").forEach(el => {
    el.addEventListener("click", () => {
      const idx = parseInt(el.dataset.idx);
      selectSearchResult(idx);
    });
  });
});

searchBox.addEventListener("keydown", (e) => {
  if (!searchResultNodes.length) return;
  if (e.key === "ArrowDown") {
    e.preventDefault();
    activeResultIdx = Math.min(activeResultIdx + 1, searchResultNodes.length - 1);
    updateActiveResult();
  } else if (e.key === "ArrowUp") {
    e.preventDefault();
    activeResultIdx = Math.max(activeResultIdx - 1, 0);
    updateActiveResult();
  } else if (e.key === "Enter" && activeResultIdx >= 0) {
    e.preventDefault();
    selectSearchResult(activeResultIdx);
  } else if (e.key === "Escape") {
    searchResults.classList.remove("visible");
    searchBox.value = "";
    searchResultNodes = [];
    clearHighlights();
    searchBox.blur();
  }
});

function updateActiveResult() {
  searchResults.querySelectorAll(".search-result-item").forEach((el, i) => {
    el.classList.toggle("active", i === activeResultIdx);
    if (i === activeResultIdx) el.scrollIntoView({ block: "nearest" });
  });
}

function selectSearchResult(idx) {
  const d = searchResultNodes[idx];
  clearHighlights();
  d.data._highlighted = true;
  expandPathTo(d);
  setTimeout(() => {
    zoomToNode(d);
    update(root);
  }, 100);
  searchResults.classList.remove("visible");
}

function clearHighlights() {
  buildFlatList().forEach(d => { d.data._highlighted = false; });
  update(root);
}

document.addEventListener("click", (e) => {
  if (!e.target.closest(".search-wrap")) {
    searchResults.classList.remove("visible");
  }
});

// Toolbar buttons
document.getElementById("btn-zoom-in").addEventListener("click", () => {
  svgEl.transition().duration(300).call(zoom.scaleBy, 1.4);
});
document.getElementById("btn-zoom-out").addEventListener("click", () => {
  svgEl.transition().duration(300).call(zoom.scaleBy, 0.7);
});
document.getElementById("btn-fit").addEventListener("click", fitToScreen);
document.getElementById("btn-expand-all").addEventListener("click", () => {
  expandAll(root);
  update(root);
  setTimeout(fitToScreen, 500);
});
document.getElementById("btn-collapse").addEventListener("click", () => {
  collapseToLevel(root, 2);
  update(root);
  setTimeout(fitToScreen, 500);
});

// Minimap
const minimapSvg = d3.select("#minimap-container").append("svg");
const gMini = minimapSvg.append("g");
const gMiniNodes = gMini.append("g");
const miniViewport = gMini.append("rect").attr("class", "minimap-viewport");

function updateMinimap() {
  const bounds = gMain.node().getBBox();
  if (!bounds.width) return;

  const mW = 200;
  const mH = 140;
  const pad = 10;
  const scale = Math.min((mW - pad * 2) / bounds.width, (mH - pad * 2) / bounds.height);
  const tx = mW / 2 - (bounds.x + bounds.width / 2) * scale;
  const ty = mH / 2 - (bounds.y + bounds.height / 2) * scale;
  gMini.attr("transform", `translate(${tx},${ty}) scale(${scale})`);

  const allN = root.descendants();
  const dots = gMiniNodes.selectAll("rect").data(allN, d => d.data._id);
  dots.exit().remove();
  dots.enter().append("rect")
    .attr("width", 8 / scale).attr("height", 4 / scale)
    .attr("rx", 2 / scale)
    .merge(dots)
    .attr("x", d => d.x - 4 / scale)
    .attr("y", d => d.y - 2 / scale)
    .attr("fill", d => DEPT_COLORS[d.data.dept]);

  const t = d3.zoomTransform(svgEl.node());
  const cw = container.clientWidth;
  const ch = container.clientHeight;
  miniViewport
    .attr("x", -t.x / t.k)
    .attr("y", -t.y / t.k)
    .attr("width", cw / t.k)
    .attr("height", ch / t.k);
}

document.addEventListener("keydown", (e) => {
  if (e.target.tagName === "INPUT") return;
  if (e.key === "/" || (e.key === "f" && (e.metaKey || e.ctrlKey))) {
    e.preventDefault();
    searchBox.focus();
  }
});

// Init
update(root);
setTimeout(fitToScreen, 100);

window.addEventListener("resize", () => {
  setTimeout(fitToScreen, 100);
});
</script>
